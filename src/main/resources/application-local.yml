spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/kou_app_local
        username: admin
        password: 1234qwer
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true

    data:
        redis:
            host: localhost
            port: 6379
            password:

logging:
    level:
        com.kou.kouappapi: DEBUG
        org.springframework.web: DEBUG
        org.springframework.security: DEBUG

jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 3600000

google:
    oauth2:
        playground: ${GOOGLE_OAUTH2_PLAYGROUND}

cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
    folder:
        profile: kou-app/local/individual/profile

springdoc:
    api-docs:
        enabled: true
    swagger-ui:
        enabled: true
