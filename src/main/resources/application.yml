spring:
    application:
        name: usagi-app-api
    jpa:
        open-in-view: false
        properties:
            hibernate:
                format_sql: true
                use_sql_comments: true
                default_batch_fetch_size: 100
    flyway:
        enabled: true
        baseline-on-migrate: true
        baseline-version: 1
        locations: classpath:db/migration
        validate-on-migrate: true

server:
    port: 8080
    shutdown: graceful

management:
    endpoints:
        web:
            exposure:
                include: health,info
    endpoint:
        health:
            show-details: when-authorized

google:
    oauth2:
        web-client-id: ${GOOGLE_OAUTH2_WEB_CLIENT_ID}
        ios-client-id: ${GOOGLE_OAUTH2_IOS_CLIENT_ID}

springdoc:
  api-docs:
      enabled: false
      path: /v3/api-docs
  swagger-ui:
      enabled: false
      path: /swagger-ui.html


