spring:
    profiles:
        active: local
    application:
        name: kou-app-api
    jpa:
        open-in-view: false
        properties:
            hibernate:
                format_sql: true
                use_sql_comments: true
    security:
      oauth2:
        client:
            registration:
              google:
                  client-id:
                  client-secret:
                  scope: profile, email
                  redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

server:
    port: 8080
    shutdown: graceful

management:
    endpoints:
        web:
            exposure:
                include: health,info
    endpoint:
        health:
            show-details: when-authorized
