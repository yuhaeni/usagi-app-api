spring:
    datasource:
        url: ${KOU_DEV_DB_URL}
        username: ${KOU_DEV_DB_USERNAME}
        password: ${KOU_DEV_DB_PASSWORD}
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: false

    data:
        redis:
            host: ${KOU_DEV_REDIS_HOST:localhost}
            port: 6379
            password: ${KOU_DEV_REDIS_PASSWORD:}

logging:
    level:
        com.kou.kouappapi: DEBUG
        org.springframework.web: DEBUG
        org.springframework.security: DEBUG

jwt:
    secret: ${KOU_DEV_JWT_SECRET}
    access-token-expiration: 3600000

cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
    folder:
        profile: kou-app/dev/individual/profile

springdoc:
    api-docs:
        enabled: true
    swagger-ui:
        enabled: true
