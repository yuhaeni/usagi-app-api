spring:
    datasource:

    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: true
    data:
        redis:
            password:

jwt:
    secret: ${JWT_SECRET}
    access-token-expire-duration: 1800000
    refresh-token-expire-duration: 1209600000

google:
    oauth2:
        playground: ${GOOGLE_OAUTH2_PLAYGROUND}
        client-id: ${GOOGLE_OAUTH2_CLIENT_ID}

cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
    folder:
        profile: usagi-app/test/individual/profile
