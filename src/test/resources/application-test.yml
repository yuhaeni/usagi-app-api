spring:
    datasource:
        url: jdbc:h2:mem:kou_app_local;
        driver-class-name: org.h2.Driver
        username: sa
        password:

    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: false
        database-platform: org.hibernate.dialect.H2Dialect

    h2:
        console:
            enabled: false
