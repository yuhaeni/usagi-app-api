name: Deploy to DEV (Lightsail)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ENVIRONMENT: dev
  SERVICE_NAME: kou-app-dev
  APP_IMAGE_NAME: kou-app-dev
  NGINX_IMAGE_NAME: kou-nginx-dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # ============================================
    # Build & Test
    # ============================================

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Kotest
        run: ./gradlew test --no-daemon
        continue-on-error: false

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-dev
          path: build/test-results/

      - name: Build with Gradle (DEV)
        run: ./gradlew clean build --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build App Docker image (DEV)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            ${{ env.APP_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.APP_IMAGE_NAME }}:latest-dev
          build-args: |
            SPRING_PROFILES_ACTIVE=dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build Nginx Docker image (DEV)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./nginx/Dockerfile
          push: false
          tags: |
            ${{ env.NGINX_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.NGINX_IMAGE_NAME }}:latest-dev
          build-args: |
            ENVIRONMENT=dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Verify Docker images
        run: |
          echo "=== DEV Environment Images ==="
          docker images | grep ${{ env.APP_IMAGE_NAME }}
          docker images | grep ${{ env.NGINX_IMAGE_NAME }}

      # ============================================
      # Deploy to Lightsail
      # ============================================

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.KOU_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.KOU_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Lightsail Plugin
        run: |
          curl "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" -o "/usr/local/bin/lightsailctl"
          sudo chmod +x /usr/local/bin/lightsailctl

      - name: Push App image to Lightsail
        run: |
          aws lightsail push-container-image \
            --service-name ${{ env.SERVICE_NAME }} \
            --label app-${{ github.sha }} \
            --image ${{ env.APP_IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.AWS_REGION }}

      - name: Push Nginx image to Lightsail
        run: |
          aws lightsail push-container-image \
            --service-name ${{ env.SERVICE_NAME }} \
            --label nginx-${{ github.sha }} \
            --image ${{ env.NGINX_IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.AWS_REGION }}

      - name: Get pushed image names
        id: image-names
        run: |
          APP_IMAGE=$(aws lightsail get-container-images --service-name ${{ env.SERVICE_NAME }} --region ${{ env.AWS_REGION }} | jq -r '.containerImages[] | select(.image | contains("app-${{ github.sha }}")) | .image')
          NGINX_IMAGE=$(aws lightsail get-container-images --service-name ${{ env.SERVICE_NAME }} --region ${{ env.AWS_REGION }} | jq -r '.containerImages[] | select(.image | contains("nginx-${{ github.sha }}")) | .image')
          
          echo "app_image=$APP_IMAGE" >> $GITHUB_OUTPUT
          echo "nginx_image=$NGINX_IMAGE" >> $GITHUB_OUTPUT
          
          echo "App Image: $APP_IMAGE"
          echo "Nginx Image: $NGINX_IMAGE"

      - name: Create deployment configuration
        run: |
          cat > deployment.json << EOF
          {
            "containers": {
              "app": {
                "image": "${{ steps.image-names.outputs.app_image }}",
                "environment": {
                  "SPRING_PROFILES_ACTIVE": "dev",
                  "DB_URL": "${{ secrets.KOU_DEV_DB_URL }}",
                  "DB_USERNAME": "${{ secrets.KOU_DEV_DB_USERNAME }}",
                  "DB_PASSWORD": "${{ secrets.KOU_DEV_DB_PASSWORD }}"
                },
                "ports": {
                  "8080": "HTTP"
                }
              },
              "nginx": {
                "image": "${{ steps.image-names.outputs.nginx_image }}",
                "ports": {
                  "80": "HTTP"
                }
              }
            },
            "publicEndpoint": {
              "containerName": "nginx",
              "containerPort": 80,
              "healthCheck": {
                "healthyThreshold": 2,
                "unhealthyThreshold": 2,
                "timeoutSeconds": 5,
                "intervalSeconds": 30,
                "path": "/health",
                "successCodes": "200"
              }
            }
          }
          EOF
          
          echo "=== Deployment Configuration ==="
          cat deployment.json

      - name: Deploy to Lightsail
        run: |
          aws lightsail create-container-service-deployment \
            --service-name ${{ env.SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json file://deployment.json

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to complete..."
          for i in {1..30}; do
            STATE=$(aws lightsail get-container-services \
              --service-name ${{ env.SERVICE_NAME }} \
              --region ${{ env.AWS_REGION }} \
              --query 'containerServices[0].state' \
              --output text)
      
            CURRENT_DEPLOYMENT=$(aws lightsail get-container-services \
              --service-name ${{ env.SERVICE_NAME }} \
              --region ${{ env.AWS_REGION }} \
              --query 'containerServices[0].currentDeployment.state' \
              --output text)
      
            echo "Attempt $i/30: Service state: $STATE, Deployment state: $CURRENT_DEPLOYMENT"
      
            if [ "$STATE" = "RUNNING" ] && [ "$CURRENT_DEPLOYMENT" = "ACTIVE" ]; then
              echo "✅ Deployment successful!"
              exit 0
            elif [ "$STATE" = "FAILED" ] || [ "$CURRENT_DEPLOYMENT" = "FAILED" ]; then
              echo "❌ Deployment failed!"
      
              aws lightsail get-container-log \
                --service-name ${{ env.SERVICE_NAME }} \
                --container-name app \
                --region ${{ env.AWS_REGION }} || true
      
              exit 1
            fi
      
            sleep 60
          done
      
          echo "⚠️ Deployment timeout after 10 minutes"
          exit 1

      - name: Get service URL
        if: success()
        run: |
          SERVICE_URL=$(aws lightsail get-container-services \
            --service-name ${{ env.SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'containerServices[0].url' \
            --output text)
          
          echo "================================================"
          echo "🚀 DEV Environment deployed successfully!"
          echo "📍 Service URL: $SERVICE_URL"
          echo "🏥 Health Check: $SERVICE_URL/actuator/health"
          echo "================================================"

      - name: Health check
        if: success()
        run: |
          SERVICE_URL=$(aws lightsail get-container-services \
            --service-name ${{ env.SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'containerServices[0].url' \
            --output text)
          
          echo "Performing health check..."
          
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $SERVICE_URL/actuator/health || echo "000")
          
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed! (HTTP $HTTP_CODE)"
              curl -s $SERVICE_URL/actuator/health
              exit 0
            fi
          
            echo "Attempt $i/10: HTTP $HTTP_CODE - Waiting..."
            sleep 10
          done
          
          echo "⚠️ Health check did not pass within timeout"
          exit 1

    outputs:
      image-tag: ${{ github.sha }}
      environment: dev