name: Claude Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            이 PR의 변경사항을 한국어로 리뷰하라. 다음 항목을 점검하고,
            각 지적에는 우선순위(**blocker** / **nit**)를 명시하라.

            1. **잠재 버그·논리 오류·엣지케이스**
               - null/예외 처리, 동시성, 트랜잭션 경계, 입력 경계값
            2. **가독성·네이밍·중복**
               - 의도가 드러나는 이름인지, 추출 가능한 중복이 있는지
            3. **기존 코드 컨벤션과의 일관성**
               - 레포의 패턴(레이어 구조, DTO 분리, 응답 래퍼 등)과 어긋나는 부분
            4. **누락된 테스트**
               - 추가/변경된 분기 중 테스트가 없는 부분, 보강할 케이스
            5. **보안 (OWASP 관점)**
               - 인증/인가 누락, 입력 검증, SQL/XSS/CSRF 노출,
               - 시크릿/PII 로깅, 외부 호출 신뢰, 권한 상승 가능성

            지적할 사항이 없는 항목은 "특이사항 없음"이라고 명시하라.

            결과는 다음 도구로 PR에 등록하라:
            - 전체 요약 및 우선순위별 정리는 `gh pr comment`로 PR 본문에 코멘트
            - 특정 라인의 구체적인 이슈는 `mcp__github_inline_comment__create_inline_comment`
              (반드시 `confirmed: true`)로 인라인 코멘트
            - 메시지로 리뷰 본문을 출력하지 말고, 반드시 GitHub 코멘트로만 남길 것
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
