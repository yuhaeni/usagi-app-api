name: Test on Pull Request

on:
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened]

env:
  JAVA_VERSION: '21'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests with Testcontainers
        run: |
            START=$(date +%s)
            ./gradlew test -PexcludeTags="local-only" --no-daemon
            END=$(date +%s)
            ELAPSED=$((END - START))
            echo "TEST_DURATION=${ELAPSED}" >> $GITHUB_ENV
            echo "⏱️ Test completed in ${ELAPSED}s"
        env:
            SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/test-results/
            build/reports/tests/

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if ./gradlew test --dry-run 2>&1 | grep -q "BUILD SUCCESSFUL"; then
            echo "✅ Tests completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed" >> $GITHUB_STEP_SUMMARY
          fi

            # 실행 시간 출력
          if [ -n "$TEST_DURATION" ]; then
            MINUTES=$((TEST_DURATION / 60))
            SECONDS=$((TEST_DURATION % 60))
            echo "⏱️ **실행 시간**: ${MINUTES}분 ${SECONDS}초" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # 테스트 결과 파싱
          if [ -d "build/test-results/test" ]; then
            TOTAL=$(find build/test-results/test -name "*.xml" -exec grep -oh 'tests="[0-9]*"' {} \; | grep -oh '[0-9]*' | awk '{s+=$1} END {print s}')
            FAILURES=$(find build/test-results/test -name "*.xml" -exec grep -oh 'failures="[0-9]*"' {} \; | grep -oh '[0-9]*' | awk '{s+=$1} END {print s}')
            PASSED=$((TOTAL - FAILURES))

            echo "- **Total**: $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **Passed**: $PASSED ✅" >> $GITHUB_STEP_SUMMARY
            echo "- **Failed**: $FAILURES ❌" >> $GITHUB_STEP_SUMMARY
          fi
